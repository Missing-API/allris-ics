# Allris platform systems and their geographic context
# Used by getLocationContextFromUrl.ts to enrich event location strings.
#
# domains:  Maps Allris platform domain suffixes to state and country.
#           Any hostname ending in that domain inherits these values.
#
# systems:  Maps individual hostnames to their Landkreis (county).
#           State and country are inherited from the matching domain entry.
#           A system entry can also override state/country if needed.

domains:
  sitzung-mv.de:
    state: Mecklenburg-Vorpommern
    country: Germany
  sitzung-online.de:
    state: Mecklenburg-Vorpommern
    country: Germany
  # Add further Allris platform domains here as needed, e.g.:
  # sitzung-bb.de:
  #   state: Brandenburg
  #   country: Germany

